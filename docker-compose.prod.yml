services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: itnext
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itnext}
      POSTGRES_DB: itnext
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itnext"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - cv_storage:/code/data/cvs
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://${SERVER_IP}:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  cv_storage:
