name: Deploy

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  ship:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build, push, migrate, deploy
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
        run: |
          az acr login --name "$ACR_NAME"
          make ship
